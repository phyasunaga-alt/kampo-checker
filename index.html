<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢方鑑査アシスト</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-title-wrapper"
                style="display: inline-flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 5px;">
                <!-- 漢方らしい葉っぱのUIアイコン (軽量インラインSVG) -->
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 22C12 22 20 18 20 12C20 6.47715 15.5228 2 12 2C8.47715 2 4 6.47715 4 12C4 18 12 22 12 22Z"
                        fill="url(#leaf-grad)" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M12 2L12 22" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M12 12C12 12 15 10 17 8" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M12 16C12 16 9 14 7 12" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <defs>
                        <linearGradient id="leaf-grad" x1="4" y1="2" x2="20" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#E8F5E9" />
                            <stop offset="1" stop-color="#C8E6C9" />
                        </linearGradient>
                    </defs>
                </svg>
                <h1 style="margin: 0; font-size: 1.8rem; letter-spacing: 0.05em; color: #2E7D32;">漢方鑑査アシスト</h1>
            </div>
            <p class="subtitle" style="margin: 0;">ツムラ漢方製剤の合算・安全性確認ツール（薬剤師向け）</p>
            <!-- モバイル用コントロール -->
            <div class="mobile-only" style="margin-top: 15px; display: flex; gap: 10px;">
                <button id="toggle-search" class="secondary-btn"
                    style="flex: 1; display: block; border: none; background: var(--primary-color); color: white; padding: 12px; border-radius: 8px; font-weight: bold;">
                    🔍 薬剤を追加・検索
                </button>
                <a href="#results-area" class="secondary-btn"
                    style="width: 50px; text-decoration: none; text-align: center; background: #f0f0f0; color: #666; padding: 12px; border-radius: 8px;">👇</a>
            </div>
        </header>

        <main class="main-content">
            <!-- Left Column: Search & Selection -->
            <section class="selection-panel">
                <div class="search-area">
                    <div class="search-box">
                        <input type="text" id="medicine-search" placeholder="番号や名前で検索 (Enterで即追加)...">
                        <span class="search-icon">🔍</span>
                        <button id="clear-search" class="clear-search-btn" title="検索条件をクリア">✖</button>
                    </div>
                </div>
                <div class="medicine-list" id="medicine-list">
                    <!-- Medicine items will be populated here -->
                    <div class="empty-state">検索してください</div>
                </div>
            </section>

            <!-- Right Column: Calculation & Results -->
            <section class="calculation-panel">
                <div class="panel-content">
                    <div class="panel-header">
                        <h2>選択された処方</h2>
                        <button id="clear-all" class="text-button">全てクリア</button>
                    </div>

                    <div class="selected-medicines" id="selected-medicines">
                        <!-- Selected items will appear here -->
                        <div class="placeholder-empty-state">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" opacity="0.15"
                                style="margin-bottom: 10px;">
                                <path
                                    d="M12 22C12 22 20 18 20 12C20 6.47715 15.5228 2 12 2C8.47715 2 4 6.47715 4 12C4 18 12 22 12 22Z"
                                    fill="#2E7D32" />
                            </svg><br>
                            左のリストから漢方薬を追加してください
                        </div>
                    </div>

                    <div class="results-container" id="results-area">
                        <!-- 印刷用ヘッダー (通常時は非表示) -->
                        <div id="print-only-header" style="display: none;">
                            <h1 style="text-align: center; margin-bottom: 20px;">漢方薬構成生薬 鑑査報告書</h1>
                            <div
                                style="display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 10px;">
                                <div style="font-size: 1rem;">
                                    <strong>作成日:</strong> <span id="print-date"></span><br>
                                    <strong>施設名:</strong> ____________________
                                </div>
                                <div style="font-size: 1rem;">
                                    <strong>担当薬剤師:</strong> ____________________ 印
                                </div>
                            </div>
                        </div>
                        <div class="result-header">
                            <h3>計算結果 (合計生薬量)</h3>
                            <button id="print-report" class="secondary-btn"
                                style="padding: 6px 12px; font-size: 0.85rem;">📄 レポート出力・印刷</button>
                        </div>
                        <span class="status-badge" id="safety-status">未計算</span>

                        <div class="warnings-area" id="warnings-area">
                            <!-- Warnings will be injected here -->
                        </div>

                        <table class="results-table">
                            <thead>
                                <tr>
                                    <th>生薬名</th>
                                    <th>合計 (g)</th>
                                    <th>状態</th>
                                </tr>
                            </thead>
                            <tbody id="results-body">
                                <!-- Results will be populated here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="data/kampo_data.js"></script>
    <script src="script.js"></script>
</body>

</html>
